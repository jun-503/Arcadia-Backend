"""
Advanced logging configuration for production deployment.
Usage: uvicorn api.main:app --log-config logging.ini
"""

[loggers]
keys=root,uvicorn,uvicorn.access,api

[handlers]
keys=default,access,console,file,error_file

[formatters]
keys=default,access,json_format

[logger_root]
level=INFO
handlers=default,file

[logger_uvicorn]
level=INFO
handlers=default,file
qualname=uvicorn
propagate=no

[logger_uvicorn.access]
level=INFO
handlers=access,file
qualname=uvicorn.access
propagate=no

[logger_api]
level=INFO
handlers=console,file,error_file
qualname=api
propagate=no

[handler_default]
class=StreamHandler
level=INFO
formatter=default
args=(sys.stdout,)

[handler_console]
class=StreamHandler
level=DEBUG
formatter=default
args=(sys.stdout,)

[handler_access]
class=StreamHandler
level=INFO
formatter=access
args=(sys.stdout,)

[handler_file]
class=handlers.RotatingFileHandler
level=INFO
formatter=default
args=('logs/api.log', 'a', 10485760, 10)

[handler_error_file]
class=handlers.RotatingFileHandler
level=ERROR
formatter=default
args=('logs/error.log', 'a', 10485760, 5)

[formatter_default]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_access]
format=%(asctime)s - %(client_addr)s - "%(request_line)s" %(status_code)s

[formatter_json_format]
format={"timestamp": "%(asctime)s", "level": "%(levelname)s", "message": "%(message)s", "logger": "%(name)s"}
